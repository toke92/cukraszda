<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; }
    audio { display: none; }
  </style>
</head>
<body>
  <audio id="r" autoplay preload="auto"></audio>
  <script>
    var streams = {
      'radio-1':       'https://icast.connectmedia.hu/5202/live.mp3',
      'sunshine':      'https://sunshine1.stream.composeit.hu/sunshine',
      'juventus':      'https://youventusradio.hu/stream_192k',
      'danubius':      'https://danubiusradio.hu/live.mp3',
      'megadance':     'https://gamershouse.hu/livemega.mp3',
      'retro':         'https://icast.connectmedia.hu/5001/live.mp3',
      'dejavu':        'https://adas.dejavuradio.hu:8178/dejavuradio'
    };

    var audio = document.getElementById('r');
    var current = 'radio-1';

    function play(key) {
      current = key || 'radio-1';
      audio.src = streams[current];
      audio.load();
      audio.play().catch(function() {});
    }

    // Induláskor az URL hash alapján választ rádiót: radio.html#radio-1
    var hash = location.hash.replace('#', '');
    play(hash || 'radio-1');

    // Ha a főoldal üzenetet küld (rádióváltás)
    window.addEventListener('message', function(e) {
      if (e.data && streams[e.data]) {
        play(e.data);
      }
    });

    // Ha megáll, újraindítja
    audio.addEventListener('error', function() {
      setTimeout(function() { play(current); }, 3000);
    });
    audio.addEventListener('stalled', function() {
      setTimeout(function() { play(current); }, 3000);
    });
  </script>
</body>
</html>
