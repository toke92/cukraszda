<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Godó Cukrászda – Tandi Cuki</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0a00;
      color: #f5e6c8;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #video-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #main-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(20,8,0,0.25) 0%,
        rgba(20,8,0,0.0) 40%,
        rgba(20,8,0,0.0) 60%,
        rgba(20,8,0,0.55) 100%
      );
      pointer-events: none;
    }

    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
    }

    .logo { display: flex; flex-direction: column; line-height: 1; }

    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #f5e6c8;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }

    .logo-sub {
      font-size: 0.85rem;
      font-weight: 300;
      color: #d4a96a;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 3px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    }

    .radio-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(20,8,0,0.55);
      border: 1px solid rgba(212,169,106,0.35);
      border-radius: 40px;
      padding: 8px 18px;
      backdrop-filter: blur(8px);
    }

    .radio-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #d4a96a;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .radio-label {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: #f5e6c8;
      text-transform: uppercase;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 18px 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: #d4a96a;
      font-style: italic;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    .clock {
      font-size: 1.6rem;
      font-weight: 300;
      color: #f5e6c8;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    .corner-deco {
      position: fixed;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #d4a96a;
      font-size: 1.1rem;
      opacity: 0.55;
      letter-spacing: 0.5em;
    }

    /* Indítás overlay */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(26,10,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #start-overlay h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: #f5e6c8;
      margin-bottom: 10px;
    }

    #start-overlay p {
      color: #d4a96a;
      font-size: 1rem;
      letter-spacing: 0.15em;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    #start-btn {
      background: #d4a96a;
      color: #1a0a00;
      border: none;
      border-radius: 40px;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.1em;
    }

    /* Rejtett reklám kihagyása gomb – jobb felső sarok */
    #skip-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 50;
      background: rgba(20,8,0,0.01);
      border: none;
      color: rgba(255,255,255,0.01);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0;
      transition: background 0.3s, color 0.3s;
    }

    /* Ha valaki 3x gyorsan nyomja, megmutatja magát */
    #skip-btn.visible {
      background: rgba(212,169,106,0.85);
      color: #1a0a00;
      font-size: 0.7rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- Indítás overlay -->
  <div id="start-overlay" onclick="startAll()">
    <h1>Godó Cukrászda</h1>
    <p>Tandi Cuki</p>
    <button id="start-btn">▶ &nbsp; Indítás</button>
  </div>

  <!-- VIDEÓ -->
  <div id="video-container">
    <video id="main-video" playsinline loop>
      <source src="https://res.cloudinary.com/dekyvz2kj/video/upload/v1781293765/Godo_Cukraszda_Bemutato1_uf6vhy.mp4" type="video/mp4">
    </video>
  </div>

  <div class="overlay"></div>
  <div class="corner-deco">✦ &nbsp; ✦ &nbsp; ✦</div>

  <div class="top-bar">
    <div class="logo">
      <span class="logo-main">Godó Cukrászda</span>
      <span class="logo-sub">Tandi Cuki</span>
    </div>
    <div class="radio-badge">
      <div class="radio-dot"></div>
      <span class="radio-label" id="radio-label">Radio 1 – Élő adás</span>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="tagline">Minden falat egy kis boldogság.</div>
    <div class="clock" id="clock">00:00</div>
  </div>

  <!-- Rejtett reklám kihagyása gomb -->
  <button id="skip-btn" onclick="skipAd()" title=""></button>

  <!-- RÁDIÓ – közvetlen audio elem, több fallback URL -->
  <audio id="radio" preload="none"></audio>

  <script>
    // ÓRA
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 10000);

    // RÁDIÓ stream URL-ek (sorban próbálja)
    const streams = [
      'https://stream.radio1.hu/radio1',
      'https://radio1.hu/stream',
      'https://edge.audio.niceshops.net/radio1',
      'https://icecast.radio1.hu/radio1.mp3',
    ];
    let streamIdx = 0;
    const audio = document.getElementById('radio');
    audio.volume = 0.65;

    function tryStream() {
      if (streamIdx >= streams.length) {
        document.getElementById('radio-label').textContent = 'Rádió – nincs kapcsolat';
        return;
      }
      audio.src = streams[streamIdx];
      audio.load();
      audio.play().catch(() => {
        streamIdx++;
        tryStream();
      });
    }

    // INDÍTÁS
    function startAll() {
      document.getElementById('start-overlay').style.display = 'none';
      // Videó indítása – hang NÉLKÜL (muted=false de nincs hang a videóban)
      const video = document.getElementById('main-video');
      video.muted = true; // videónak nincs hangja, rádió adja a hangot
      video.play();
      // Rádió indítása
      tryStream();
    }

    // REKLÁM KIHAGYÁS GOMB
    // Rejtett gomb – ha megnyomják, újraindítja a stream-et (átugorja a reklámot)
    let skipTaps = 0;
    let skipTimer = null;
    const skipBtn = document.getElementById('skip-btn');

    skipBtn.addEventListener('click', function() {
      skipTaps++;
      clearTimeout(skipTimer);
      if (skipTaps >= 2) {
        skipBtn.classList.add('visible');
        skipBtn.title = 'Reklám kihagyás';
        skipBtn.style.fontSize = '0.65rem';
        skipBtn.textContent = 'SKIP';
      }
      skipTimer = setTimeout(() => {
        skipTaps = 0;
      }, 2000);
    });

    function skipAd() {
      // Rádió újraindítása = reklám kihagyása
      audio.pause();
      audio.currentTime = 0;
      streamIdx = 0;
      setTimeout(() => {
        tryStream();
      }, 500);
    }

    // Ha a rádió leáll (pl. reklám után), automatikusan újraindul
    audio.addEventListener('ended', () => {
      streamIdx = 0;
      tryStream();
    });

    audio.addEventListener('error', () => {
      streamIdx++;
      tryStream();
    });
  </script>

</body>
</html>
