<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Godó Cukrászda – Tandi Cuki</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0a00;
      color: #f5e6c8;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* VIDEO */
    #video-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(20, 8, 0, 0.25) 0%,
        rgba(20, 8, 0, 0.0) 40%,
        rgba(20, 8, 0, 0.0) 60%,
        rgba(20, 8, 0, 0.55) 100%
      );
      pointer-events: none;
    }

    /* TOP BAR */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #f5e6c8;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }

    .logo-sub {
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: #d4a96a;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 3px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    }

    /* RADIO INDICATOR */
    .radio-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(20, 8, 0, 0.55);
      border: 1px solid rgba(212, 169, 106, 0.35);
      border-radius: 40px;
      padding: 8px 18px;
      backdrop-filter: blur(8px);
    }

    .radio-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #d4a96a;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .radio-label {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: #f5e6c8;
      text-transform: uppercase;
    }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 18px 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: #d4a96a;
      font-style: italic;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    .clock {
      font-family: 'Lato', sans-serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: #f5e6c8;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    /* AUDIO HIDDEN */
    audio { display: none; }

    /* Decorative corner */
    .corner-deco {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #d4a96a;
      font-size: 1.1rem;
      opacity: 0.55;
      letter-spacing: 0.5em;
    }
  </style>
</head>
<body>

  <!-- VIDEO (Google Drive embed) -->
  <div id="video-container">
    <iframe
      id="gd-video"
      src="https://drive.google.com/file/d/1TFg46bXb6FCJLgXgrfjLoCm7vyUg4psL/preview?autoplay=1&loop=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- OVERLAY gradient -->
  <div class="overlay"></div>

  <!-- DECORATIVE TOP CENTER -->
  <div class="corner-deco">✦ &nbsp; ✦ &nbsp; ✦</div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">
      <span class="logo-main">Godó Cukrászda</span>
      <span class="logo-sub">Tandi Cuki</span>
    </div>
    <div class="radio-badge">
      <div class="radio-dot"></div>
      <span class="radio-label">Radio 1 – Élő adás</span>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="tagline">Minden falat egy kis boldogság.</div>
    <div class="clock" id="clock">00:00</div>
  </div>

  <!-- RADIO 1 AUDIO -->
  <audio id="radio" autoplay loop>
    <source src="https://stream.radio1.hu/radio1" type="audio/mpeg">
    <source src="http://stream.radio1.hu/radio1" type="audio/mpeg">
  </audio>

  <script>
    // ÓRA
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 10000);

    // RÁDIÓ autoplay (böngésző blokkolás ellen)
    const audio = document.getElementById('radio');
    audio.volume = 0.5;

    document.addEventListener('click', () => {
      if (audio.paused) audio.play();
    }, { once: true });

    // Google Drive videó loop – iframe újratöltés amikor véget ér
    // (GD preview nem küld ended eseményt, ezért időzítővel oldjuk meg)
    // Ha ismered a videó hosszát percben, állítsd be itt:
    const VIDEO_LENGTH_MS = (13 * 60 + 46) * 1000; // 13 perc 46 másodperc

    function reloadVideo() {
      const iframe = document.getElementById('gd-video');
      const src = iframe.src;
      iframe.src = '';
      setTimeout(() => { iframe.src = src; }, 500);
    }

    setInterval(reloadVideo, VIDEO_LENGTH_MS);
  </script>

</body>
</html>
