<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Godó Cukrászda – Tandi Cuki</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0a00;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #video-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #main-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(20,8,0,0.3) 0%,
        rgba(20,8,0,0.0) 35%,
        rgba(20,8,0,0.0) 65%,
        rgba(20,8,0,0.6) 100%
      );
      pointer-events: none;
    }

    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
    }

    .logo { display: flex; flex-direction: column; line-height: 1; }

    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #f5e6c8;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    .logo-sub {
      font-size: 0.85rem;
      font-weight: 300;
      color: #d4a96a;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 3px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    .radio-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .radio-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(20,8,0,0.6);
      border: 1px solid rgba(212,169,106,0.4);
      border-radius: 40px;
      padding: 8px 18px;
      backdrop-filter: blur(8px);
    }

    .radio-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #d4a96a;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .radio-dot.error { background: #888; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .radio-label {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #f5e6c8;
      text-transform: uppercase;
    }

    #radio-select {
      background: rgba(20,8,0,0.7);
      border: 1px solid rgba(212,169,106,0.4);
      border-radius: 20px;
      color: #d4a96a;
      font-family: 'Lato', sans-serif;
      font-size: 0.75rem;
      padding: 6px 14px;
      cursor: pointer;
      outline: none;
      letter-spacing: 0.06em;
      width: 100%;
    }

    #radio-select option {
      background: #1a0a00;
      color: #f5e6c8;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 18px 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: #d4a96a;
      font-style: italic;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    }

    .clock {
      font-size: 1.6rem;
      font-weight: 300;
      color: #f5e6c8;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    }

    .corner-deco {
      position: fixed;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #d4a96a;
      font-size: 1.1rem;
      opacity: 0.5;
      letter-spacing: 0.5em;
    }

    /* Indítás overlay */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(26,10,0,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #start-overlay h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      color: #f5e6c8;
      margin-bottom: 8px;
      text-align: center;
    }

    #start-overlay p {
      color: #d4a96a;
      font-size: 1rem;
      letter-spacing: 0.2em;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    #start-btn {
      background: #d4a96a;
      color: #1a0a00;
      border: none;
      border-radius: 40px;
      padding: 18px 56px;
      font-size: 1.15rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>

  <!-- Indítás overlay -->
  <div id="start-overlay">
    <h1>Godó Cukrászda</h1>
    <p>Tandi Cuki</p>
    <button id="start-btn" onclick="startAll()">▶ &nbsp; Indítás</button>
  </div>

  <!-- VIDEÓ -->
  <div id="video-container">
    <video id="main-video" muted playsinline loop preload="auto">
      <source src="https://res.cloudinary.com/dekyvz2kj/video/upload/v1781293765/Godo_Cukraszda_Bemutato1_uf6vhy.mp4" type="video/mp4">
    </video>
  </div>

  <div class="overlay"></div>
  <div class="corner-deco">✦ &nbsp; ✦ &nbsp; ✦</div>

  <div class="top-bar">
    <div class="logo">
      <span class="logo-main">Godó Cukrászda</span>
      <span class="logo-sub">Tandi Cuki</span>
    </div>
    <div class="radio-area">
      <div class="radio-badge">
        <div class="radio-dot" id="radio-dot"></div>
        <span class="radio-label" id="radio-label">Rádió 1 – Élő adás</span>
      </div>
      <select id="radio-select" onchange="changeRadio(this.value, this.options[this.selectedIndex].text)">
        <option value="https://icast.connectmedia.hu/5202/live.mp3">🎵 Rádió 1</option>
        <option value="https://sunshine1.stream.composeit.hu/sunshine">🎵 Sunshine Rádió</option>
        <option value="https://youventusradio.hu/stream_192k">🎵 Juventus Rádió</option>
        <option value="https://danubiusradio.hu/live.mp3">🎵 Danubius Rádió</option>
        <option value="https://gamershouse.hu/livemega.mp3">🎵 MegaDance Rádió</option>
        <option value="https://icast.connectmedia.hu/4740/live.mp3">🎵 Retro Rádió</option>
        <option value="https://stream.dejavuradio.hu/dejavu">🎵 Déjà Vu Rádió</option>
      </select>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="tagline">Minden falat egy kis boldogság.</div>
    <div class="clock" id="clock">00:00</div>
  </div>

  <audio id="radio" preload="none"></audio>

  <script>
    // ÓRA
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 10000);

    const audio = document.getElementById('radio');
    audio.volume = 0.65;

    function setRadioStatus(ok) {
      const dot = document.getElementById('radio-dot');
      if (ok) {
        dot.classList.remove('error');
      } else {
        dot.classList.add('error');
        document.getElementById('radio-label').textContent = 'Nincs kapcsolat';
      }
    }

    function playRadio(url, name) {
      audio.pause();
      audio.src = url;
      audio.load();
      audio.play()
        .then(() => { setRadioStatus(true); })
        .catch(() => { setRadioStatus(false); });
      if (name) {
        document.getElementById('radio-label').textContent = name + ' – Élő adás';
      }
    }

    function changeRadio(url, name) {
      const cleanName = name.replace('🎵 ', '');
      playRadio(url, cleanName);
    }

    function startAll() {
      document.getElementById('start-overlay').style.display = 'none';

      // 1. Videó azonnal elindul
      const video = document.getElementById('main-video');
      video.play();

      // 2. Rádió 2 másodperccel később indul – TV-n nem okoz fekete képernyőt
      setTimeout(() => {
        playRadio('https://icast.connectmedia.hu/5202/live.mp3', 'Rádió 1');
      }, 2000);
    }

    // Ha a rádió hibázik, 5mp után újrapróbálja
    audio.addEventListener('error', () => {
      setTimeout(() => {
        if (audio.src) {
          audio.load();
          audio.play().catch(() => {});
        }
      }, 5000);
    });
  </script>

</body>
</html>
